<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Isometric Cube representing Structure, Risk, Resilience -->
  <g transform="translate(50, 50)">
    <!-- Top Face (White) -->
    <path d="M 0 -40 L 34.64 -20 L 0 0 L -34.64 -20 Z" fill="#FFFFFF" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
    <!-- Left Face (Orange) -->
    <path d="M -34.64 -20 L 0 0 L 0 40 L -34.64 20 Z" fill="#FF6B00" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
    <!-- Right Face (Black) -->
    <path d="M 0 0 L 34.64 -20 L 34.64 20 L 0 40 Z" fill="#000000" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
  </g>
</svg>
